<div id="test" style="position: absolute; left: 300px; top: 500px; font-family: 'Times New Roman', Times, serif; font-size: 18px;">
			<p>1. ¿Qué arma usas? <br>
		<button onclick="sumarPunto('katniss')">Arco</button>
		<button onclick="sumarPunto('bella')">Ninguna</button>
		</p>
		<p>2. ¿Tu lugar favorito? <br>
		<button onclick="sumarPunto('bella')">Lluvia</button>
		<button onclick="sumarPunto('katniss')">Bosque</button>
		</p>
		<p>3. ¿Tomas café? <br>
		<button onclick="sumarPunto('bella')">No, prefiero tomar gaseosa</button>
		<button onclick="sumarPunto('katniss')">Sí, necesito energía</button>
		</p>
		<p>4. ¿Qué palabra te define más? <br>
		<button onclick="sumarPunto('bella')">Observador/a/e</button>
		<button onclick="sumarPunto('katniss')">Guerrero/a/e</button>
		</p>
		<button onclick="resultado()">Resultado</button>
		<p id="resultadoTest"></p>
	</div>

	<script>
		let puntosBella = 0, puntosKatniss = 0;

		function sumarPunto(personaje) {
			if(personaje === 'bella') puntosBella++;
			else puntosKatniss++;
		}

		function resultado() {
			if(puntosBella > puntosKatniss)
				document.getElementById('resultadoTest').innerHTML = 'Eres Bella 🧛';
			else if(puntosKatniss > puntosBella)
				document.getElementById('resultadoTest').innerHTML = 'Eres Katniss 🏹';
			else
				document.getElementById('resultadoTest').innerHTML = 'Eres un personaje secundario...';
		}
	</script>
