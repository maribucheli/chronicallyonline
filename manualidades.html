<div id="pixelArt" style="display:grid; grid-template-columns:repeat(16,30px);"></div>
<button onclick="limpiarPixel()">Limpiar</button>

<script>
const colores = ['#000','#ff00ff','#00ff00','#ffff00'];
let colorActual = 0;

// Crear 256 celdas
for(let i=0; i<256; i++) {
let celda = document.createElement('div');
celda.style.width = '30px';
celda.style.height = '30px';
celda.style.border = '1px solid gray';
celda.style.backgroundColor = '#fff';
celda.onclick = () => {
celda.style.backgroundColor = colores[colorActual];
};
document.getElementById('pixelArt').appendChild(celda);
}

function limpiarPixel() {
document.querySelectorAll('#pixelArt div').forEach(c => c.style.backgroundColor = '#fff');
}
</script>
